<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Will You Marry Me?</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#1a0a2e;
  --bg2:#2d1b4e;
  --pink:#ff6b9d;
  --pink2:#ff9ec4;
  --yellow:#ffd700;
  --cyan:#00ffcc;
  --white:#fff0f8;
  --red:#ff3366;
  --purple:#c77dff;
  --dark:#0d0620;
}
html,body{height:100%;width:100%;overflow:hidden;touch-action:none;}
body{
  background:var(--bg);
  font-family:'Press Start 2P',monospace;
  color:var(--white);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;
  image-rendering:pixelated;
}

/* Starfield */
canvas#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* Pixel card — box-shadow border trick for chunky pixel border */
.card{
  position:relative;z-index:10;
  background:var(--bg2);
  width:92vw;max-width:440px;
  padding:clamp(20px,5vw,36px) clamp(16px,4vw,32px);
  text-align:center;
  /* 4-layer chunky pixel border */
  box-shadow:
    0 0 0 4px var(--pink),
    0 0 0 8px var(--bg),
    0 0 0 12px var(--yellow),
    0 0 0 16px var(--bg),
    8px 8px 0 16px rgba(0,0,0,0.5);
  animation:cardIn .6s steps(6) both;
  image-rendering:pixelated;
}
@keyframes cardIn{
  0%{opacity:0;transform:scale(0) translateY(40px);}
  100%{opacity:1;transform:scale(1) translateY(0);}
}

/* Pixel heart animation */
.pixel-heart{
  display:block;
  margin:0 auto 12px;
  width:clamp(48px,12vw,72px);
  height:clamp(48px,12vw,72px);
  animation:heartPulse 1s steps(2) infinite;
}
@keyframes heartPulse{0%{transform:scale(1);}50%{transform:scale(1.12);}100%{transform:scale(1);}}

.eyebrow{
  font-size:clamp(5px,1.6vw,8px);
  letter-spacing:.1em;
  color:var(--cyan);
  margin-bottom:14px;
  opacity:0;animation:blink .4s steps(1) 0.5s forwards;
  text-shadow:0 0 8px var(--cyan);
}
@keyframes blink{to{opacity:1;}}

.title{
  font-size:clamp(10px,3.5vw,18px);
  color:var(--yellow);
  line-height:1.6;
  margin:10px 0 6px;
  text-shadow:3px 3px 0 #7a3000, 0 0 16px rgba(255,215,0,.4);
  opacity:0;animation:pixelReveal .6s steps(8) .9s forwards;
}
@keyframes pixelReveal{0%{opacity:0;clip-path:inset(0 100% 0 0);}100%{opacity:1;clip-path:inset(0 0% 0 0);}}

.subtitle{
  font-size:clamp(7px,2vw,10px);
  color:var(--pink2);
  line-height:1.8;
  margin:10px 0 18px;
  opacity:0;animation:pixelReveal .8s steps(10) 1.3s forwards;
  text-shadow:2px 2px 0 #7a0033;
}

/* Pixel divider */
.px-divider{
  height:4px;
  background:repeating-linear-gradient(90deg, var(--pink) 0px, var(--pink) 8px, transparent 8px, transparent 16px);
  margin:12px 0;
  opacity:.7;
}

/* Buttons */
.buttons-area{
  position:relative;min-height:52px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;animation:blink .4s steps(1) 2s forwards;
}

.btn-yes{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px,2.5vw,12px);
  color:var(--dark);
  background:var(--pink);
  border:none;
  cursor:pointer;
  padding:clamp(10px,2.5vw,14px) clamp(18px,5vw,32px);
  /* pixel button shadow */
  box-shadow:4px 4px 0 var(--red), 6px 6px 0 rgba(0,0,0,0.4);
  position:relative;z-index:20;
  transition:padding-left .35s steps(6), padding-right .35s steps(6), box-shadow .1s;
  white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
  image-rendering:pixelated;
  /* NO vertical size change */
  height:auto;
  line-height:1.4;
}
.btn-yes:active{
  transform:translate(4px,4px);
  box-shadow:0 0 0 var(--red);
}

.btn-no{
  position:fixed;
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,2vw,10px);
  color:var(--purple);
  background:var(--dark);
  border:3px solid var(--purple);
  cursor:pointer;
  padding:8px 14px;
  box-shadow:3px 3px 0 #4a005a;
  z-index:50;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  transition:opacity .3s;
  image-rendering:pixelated;
}
.btn-no:active{transform:translate(3px,3px);box-shadow:0 0 0 #4a005a;}

/* YES overlay */
.yes-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  align-items:center;justify-content:center;flex-direction:column;
  background:var(--dark);
  padding:16px;overflow-y:auto;
}
.yes-overlay.show{display:flex;animation:overlayIn .3s steps(4) both;}
@keyframes overlayIn{0%{opacity:0;}100%{opacity:1;}}

.yes-title{
  font-size:clamp(16px,5vw,28px);
  color:var(--yellow);
  text-align:center;
  margin-bottom:16px;
  animation:titleFlash .4s steps(2) .2s both;
  text-shadow:4px 4px 0 #7a3000, 0 0 24px rgba(255,215,0,.6);
  line-height:1.5;
}
@keyframes titleFlash{0%{opacity:0;transform:scale(2);}100%{opacity:1;transform:scale(1);}}

.cert-wrapper{
  max-width:480px;width:100%;
  border:4px solid var(--yellow);
  box-shadow:0 0 0 8px var(--bg), 0 0 0 12px var(--pink), 8px 8px 0 12px rgba(0,0,0,.5);
  animation:certIn .5s steps(5) .4s both;
  image-rendering:pixelated;
}
@keyframes certIn{0%{opacity:0;transform:scale(0) rotate(-8deg);}100%{opacity:1;transform:scale(1) rotate(0deg);}}
.cert-wrapper img{width:100%;display:block;image-rendering:auto;}

.yes-sub{
  font-size:clamp(6px,2vw,9px);
  color:var(--cyan);
  margin-top:14px;
  letter-spacing:.1em;
  opacity:0;animation:blink .4s steps(1) 1.2s forwards;
  text-shadow:0 0 8px var(--cyan);
}

/* Pixel burst particles */
.burst{
  position:fixed;pointer-events:none;
  width:8px;height:8px;
  z-index:300;
  image-rendering:pixelated;
  animation:pixelBurst 1s steps(8) forwards;
}
@keyframes pixelBurst{
  0%{opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}
}

/* Scanline overlay */
body::after{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0px,rgba(0,0,0,.06) 1px,transparent 1px,transparent 4px);
  pointer-events:none;z-index:999;
}

/* Fullscreen yes */
.btn-yes.fullscreen{
  position:fixed!important;
  inset:0!important;
  width:100vw!important;
  height:100vh!important;
  font-size:clamp(18px,5vw,32px)!important;
  padding:0!important;
  display:flex!important;
  align-items:center!important;
  justify-content:center!important;
  z-index:100;
  transform:none!important;
  box-shadow:none!important;
  animation:fullFlash .4s steps(4) infinite alternate;
}
@keyframes fullFlash{0%{background:var(--pink);}100%{background:var(--red);}}
</style>
</head>

// ── Starfield ──
const canvas=document.getElementById('stars');
const ctx=canvas.getContext('2d');
let stars=[];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();window.addEventListener('resize',resizeCanvas);
for(let i=0;i<120;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()<.2?2:1,b:Math.random(),db:(.005+Math.random()*.01)*(Math.random()<.5?1:-1)});
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.b+=s.db;if(s.b<0||s.b>1)s.db*=-1;
    ctx.fillStyle=`rgba(255,240,255,${s.b})`;
    ctx.fillRect(Math.round(s.x),Math.round(s.y),s.s,s.s);
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ── No button ──
const noBtn=document.getElementById('noBtn'),yesBtn=document.getElementById('yesBtn');
let noCount=0;
const labels=['[ no... ]','[ r u sure? ]','[ pls no ]','[ rethink! ]','[ last chance ]','[ ...no escape ]','[ futile!! ]','[ surrender! ]'];

// Horizontal-only growth — track current padding, grow sideways only
let yesPadH=32; // starting horizontal pad in px
const padHSteps=[48,70,100,140,190,260,360,500,700];

function placeNoRandom(){
  const bw=noBtn.offsetWidth||80,bh=noBtn.offsetHeight||40;
  noBtn.style.left=(8+Math.random()*(window.innerWidth-bw-16))+'px';
  noBtn.style.top=(8+Math.random()*(window.innerHeight-bh-16))+'px';
  noBtn.style.right='auto';noBtn.style.bottom='auto';
}

window.addEventListener('load',()=>{
  const bw=noBtn.offsetWidth||80,bh=noBtn.offsetHeight||40;
  noBtn.style.left=(window.innerWidth-bw-20)+'px';
  noBtn.style.top=(window.innerHeight-bh-28)+'px';
});

function growYes(){
  if(noCount>=padHSteps.length){
    // Full screen
    yesBtn.classList.add('fullscreen');
    noBtn.style.display='none';
    return;
  }
  const ph=padHSteps[Math.min(noCount-1,padHSteps.length-1)];
  // Keep vertical padding fixed, only grow horizontal
  yesBtn.style.paddingLeft=ph+'px';
  yesBtn.style.paddingRight=ph+'px';
  // Don't touch paddingTop/paddingBottom
}

function onNo(e){
  e.preventDefault();e.stopPropagation();
  noCount++;
  placeNoRandom();
  growYes();
  noBtn.textContent=labels[Math.min(noCount,labels.length-1)];
}

noBtn.addEventListener('click',onNo);
noBtn.addEventListener('touchstart',onNo,{passive:false});
noBtn.addEventListener('mouseenter',()=>{if(noCount<5)placeNoRandom();});

// ── Yes ──
function sayYes(){
  pixelBurst();
  setTimeout(()=>document.getElementById('yesOverlay').classList.add('show'),400);
}

const burstColors=['#ff6b9d','#ffd700','#00ffcc','#c77dff','#ff3366','#fff0f8'];
function pixelBurst(){
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(let i=0;i<40;i++){
    const el=document.createElement('div');el.className='burst';
    const color=burstColors[Math.floor(Math.random()*burstColors.length)];
    const size=(Math.random()<.3?12:8);
    el.style.cssText=`width:${size}px;height:${size}px;background:${color};left:${cx}px;top:${cy}px;--tx:${(Math.random()-.5)*400}px;--ty:${(Math.random()-.5)*400}px;animation-delay:${Math.random()*.3}s;`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}
</script></body></html>
